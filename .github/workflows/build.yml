name: Build AppImage

# Runs on every push (any branch) and on manual dispatch.
on:
  push:
  workflow_dispatch:

# A newer push to the same ref supersedes an in-flight build.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Name of the uploaded artifact — the copy-paste install command references it.
  ARTIFACT_NAME: SteamDualBoot-AppImage
  # Lets tauri's bundler run nested AppImages (linuxdeploy/appimagetool) without FUSE.
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  build:
    # 24.04 ships webkit2gtk-4.1 / libsoup-3.0 that Tauri v2 needs.
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Tauri v2 + AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential curl wget file
          # FUSE for AppImage tooling (package was renamed on 24.04); non-fatal.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2 || true

      - name: Set up Rust (stable + UEFI target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bootloader
            app/src-tauri

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build bootloader (.efi)
        working-directory: bootloader
        run: cargo build --release

      - name: Build AppImage
        working-directory: app
        run: npm run tauri build -- --bundles appimage

      - name: Collect artifacts
        id: collect
        run: |
          mkdir -p dist
          APPIMAGE=$(find app/src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -z "$APPIMAGE" ]; then echo "AppImage not found" >&2; exit 1; fi
          cp "$APPIMAGE" dist/
          cp bootloader/target/x86_64-unknown-uefi/release/steamdualboot.efi dist/
          echo "appimage=$(basename "$APPIMAGE")" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.AppImage
          if-no-files-found: error

      - name: Upload bootloader artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamDualBoot-Bootloader
          path: dist/steamdualboot.efi
          if-no-files-found: error

  # ===========================================================================
  # Flatpak — the build that actually runs on the Steam Deck. SteamOS ships no
  # system WebKit, so the AppImage's bundled WebKit can't initialize EGL and the
  # window stays blank; the GNOME-runtime WebKit in this Flatpak renders fine.
  # ===========================================================================
  flatpak:
    name: Build Flatpak (Steam Deck)
    runs-on: ubuntu-24.04
    container:
      # Prebuilt image with flatpak-builder + the GNOME 46 SDK (webkit2gtk-4.1).
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Host dir bind-mounted into the flatpak build (manifest --filesystem) so
      # the rustup toolchain + cargo registry + target dir + npm cache survive
      # between runs. Keyed on the lockfiles; prefix-restore for partial reuse.
      - name: Prepare build cache directory
        run: mkdir -p /sdb-cache && chmod 777 /sdb-cache

      - name: Cache Rust toolchain, cargo + target, npm
        uses: actions/cache@v4
        with:
          path: /sdb-cache
          key: sdb-flatpak-${{ hashFiles('app/src-tauri/Cargo.lock', 'app/package-lock.json') }}
          restore-keys: |
            sdb-flatpak-

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: SteamDualBoot.flatpak
          manifest-path: flatpak/com.steamdualboot.app.yml
          cache-key: flatpak-${{ github.sha }}
          # We upload under a fixed name below so the install command is stable.
          upload-artifact: false

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamDualBoot-Flatpak
          path: SteamDualBoot.flatpak
          if-no-files-found: error

  # ===========================================================================
  # Publish copy-paste install commands (driven by repository variables) once
  # both bundles exist.
  # ===========================================================================
  install-command:
    name: Publish install commands
    needs: [build, flatpak]
    runs-on: ubuntu-24.04
    steps:
      - name: Write install commands to the run summary
        env:
          # Customizable per repo: Settings → Secrets and variables → Actions → Variables.
          INSTALL_DIR: ${{ vars.INSTALL_DIR || '$HOME/Applications' }}
        run: |
          # Actions expands its expressions before the shell; the quoted heredoc
          # keeps $HOME literal so it expands on the user's machine, not here.
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## ✅ SteamDualBoot build `${{ github.sha }}`

          ### Steam Deck — install the Flatpak (recommended)

          The AppImage can't render on SteamOS (no system WebKit) — use the Flatpak.
          Download the **SteamDualBoot-Flatpak** artifact from this run, then:

          ```bash
          flatpak install --user -y SteamDualBoot.flatpak && flatpak run com.steamdualboot.app
          ```

          Fetch + install in one go with the GitHub CLI ([`gh`](https://cli.github.com), after `gh auth login`):

          ```bash
          gh run download ${{ github.run_id }} --repo ${{ github.repository }} --name SteamDualBoot-Flatpak --dir /tmp/sdb \
            && flatpak install --user -y /tmp/sdb/SteamDualBoot.flatpak \
            && flatpak run com.steamdualboot.app
          ```

          Public repo without `gh` (tokenless via nightly.link):

          ```bash
          curl -L -o /tmp/sdb.zip "https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/SteamDualBoot-Flatpak.zip" \
            && unzip -o /tmp/sdb.zip -d /tmp/sdb \
            && flatpak install --user -y /tmp/sdb/SteamDualBoot.flatpak && flatpak run com.steamdualboot.app
          ```

          ### Desktop Linux — AppImage

          ```bash
          INSTALL_DIR="${{ vars.INSTALL_DIR || '$HOME/Applications' }}"
          mkdir -p "$INSTALL_DIR" \
            && gh run download ${{ github.run_id }} --repo ${{ github.repository }} --name ${{ env.ARTIFACT_NAME }} --dir "$INSTALL_DIR" \
            && chmod +x "$INSTALL_DIR"/*.AppImage
          ```

          > Set the repo variable **`INSTALL_DIR`** to change the AppImage location (default `$HOME/Applications`). Artifacts expire after 90 days.
          EOF
