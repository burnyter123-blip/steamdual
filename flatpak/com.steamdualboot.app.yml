# Flatpak manifest for SteamDualBoot.
#
# Why Flatpak: SteamOS ships no system WebKitGTK, so the AppImage had to bundle
# Ubuntu's, which can't initialize EGL on the Deck and aborts the WebProcess
# (blank white window). The GNOME runtime provides a WebKitGTK built to work
# with the host GPU, so the app actually renders. GNOME 46 is the runtime that
# still ships webkit2gtk-4.1 (the GTK3 API Tauri v2 links).
#
# The binary is built *inside* the SDK (not prebuilt on CI) so it matches the
# runtime's glibc. Network is allowed during the build (this is a CI artifact,
# not an offline Flathub submission), so no dependency vendoring is needed.
id: com.steamdualboot.app
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
# Node comes from the SDK extension; Rust is installed via rustup in the build
# (the SDK's rust-stable on GNOME 46 is Cargo 1.81, too old for the edition-2024
# crates in our tree — rustup gives a current stable instead).
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: steamdualboot

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  # SteamDualBoot drives host disk/boot tooling (lsblk, parted, qemu,
  # efibootmgr) via `flatpak-spawn --host`, and must see the real devices and
  # the user-selected ISO on the host filesystem.
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=host
  - --device=all
  - --env=FLATPAK=1

build-options:
  # `/sdb-cache` is a host directory bind-mounted into the build sandbox
  # (--filesystem below) and persisted across CI runs via actions/cache. The
  # rustup toolchain, cargo registry, build target dir and npm cache all live
  # there, so re-runs reuse them instead of re-downloading + recompiling.
  append-path: /usr/lib/sdk/node20/bin:/sdb-cache/cargo/bin
  build-args:
    - --share=network
    - --filesystem=/sdb-cache
  env:
    CARGO_HOME: /sdb-cache/cargo
    RUSTUP_HOME: /sdb-cache/rustup
    CARGO_TARGET_DIR: /sdb-cache/target
    npm_config_cache: /sdb-cache/npm

modules:
  - name: steamdualboot
    buildsystem: simple
    build-commands:
      # Current stable Rust (the SDK's is too old for edition-2024 crates).
      # Reuses the cached toolchain in $RUSTUP_HOME when present.
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable --no-modify-path
      - cd app && npm ci
      - cd app && npm run tauri build -- --no-bundle
      - install -Dm755 /sdb-cache/target/release/steamdualboot /app/bin/steamdualboot
      - install -Dm644 flatpak/com.steamdualboot.app.desktop /app/share/applications/com.steamdualboot.app.desktop
      - install -Dm644 app/src-tauri/icons/512x512.png /app/share/icons/hicolor/512x512/apps/com.steamdualboot.app.png
      - install -Dm644 flatpak/com.steamdualboot.app.metainfo.xml /app/share/metainfo/com.steamdualboot.app.metainfo.xml
    sources:
      - type: dir
        path: ..
